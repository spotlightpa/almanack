name: Node CI
on: [push]
permissions:
   contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: yarn install
        run: yarn
        env:
          CI: true
      - name: yarn test
        run: ./run.sh test:frontend
        env:
          CI: true
      - name: yarn build
        run: ./run.sh build:frontend
        env:
          CI: true
